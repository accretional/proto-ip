syntax = "proto3";

package ip;

option go_package = "github.com/accretional/proto-ip/pb";

message IP {
  // Encode everything in standard ipv6 to ipv4 embedding at the wire level
  sint64 network_prefix = 1;
  sint64 interface_identifier = 2;
  // Leave client formatting here so that infrastructure can distinguish between intended client version
  oneof version {
    IPv4Address v4 = 3;
    IPv6Address v6 = 4;
  }
}
  
