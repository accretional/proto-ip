syntax = "proto3";

package ip;

option go_package = "github.com/accretional/proto-ip/pb";

// not very clear on what these are, impl can change them as needed, also maybe rename
enum InterfaceClass {
  Unknown = 0;
  ETH0 = 1;
  WLAN0 = 2;
}

// not very clear on what these are, impl can change them as needed, also maybe rename
// maybe need or want more structure here
message Interface {
  InterfaceClass interface = 1;
  string name = 2;
  // maybe more data goes here like IP?
}

// typically leave this empty
message LookupFilter {
  InterfaceType interface = 1; 
}

service LocalLookup {
  rpc ListInterfaces(LookupFilter) returns(stream Interface);
  rpc ListIPs(LookupFilter) returns(stream IP);
}
